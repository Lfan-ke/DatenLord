name: log

on:
  push:
    branches-ignore: ['main', 'gh-pages']
    paths-ignore: ['.github/**']

permissions:
  contents: write

concurrency:
  group: log
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - run: git fetch origin '${{ github.ref_name }}' --depth=50
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - id: log
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          COMMITS_JSON: ${{ toJSON(github.event.commits) }}
        run: python3 .github/scripts/log.py
      - if: steps.log.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "chore(log): ${{ github.ref_name }}@${{ github.event.head_commit.id }}"
          git push origin main
      - if: steps.log.outputs.changed == 'true' && env.TRAINING_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.TRAINING_TOKEN }}
          TRAINING_TOKEN: ${{ secrets.TRAINING_TOKEN }}
          BODY_FILE: ${{ steps.log.outputs.body_file }}
        run: gh issue comment 74 --repo datenlord/training --body-file "$BODY_FILE"
